<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nota Penjualan</title>
<style>
  /* ---------- Reset & Base ---------- */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Arial', Arial, Helvetica, sans-serif;
    font-size: 11px;
    line-height: 1.6;
    color: #000;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    padding: 20px 0;
  }

  .receipt {
    width: 280px;
    background: #fff;
    padding: 16px 14px;
    border: 1px dashed #ccc;
  }

  /* ---------- Header ---------- */
  .header {
    text-align: center;
    padding-bottom: 12px;
  }
  .header .shop-name {
    font-size: 15px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .receipt-title {
    font-size: 12px;
    font-weight: 700;
    margin: 6px 0 2px;
  }

  /* ---------- Divider ---------- */
  .divider {
    border: none;
    border-top: 1px dashed #000;
    margin: 10px 0;
  }

  /* ---------- Info ---------- */
  .info {
    padding: 6px 0;
  }
  .info-row {
    margin-bottom: 4px;
  }

  /* ---------- Items (vertical layout) ---------- */
  .items-list {
    padding: 4px 0;
  }

  .item-entry {
    padding: 8px 0;
    border-bottom: 1px dotted #ccc;
  }
  .item-entry:last-child {
    border-bottom: none;
  }

  .item-name {
    font-weight: bold;
    margin-bottom: 4px;
    word-break: break-word;
  }

  .item-detail {
    display: flex;
    justify-content: space-between;
    margin-bottom: 2px;
  }

  .item-subtotal {
    text-align: right;
    font-weight: bold;
  }

  /* ---------- Totals ---------- */
  .totals {
    padding: 8px 0;
  }
  .totals .row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
  }
  .totals .row.grand {
    font-weight: bold;
    font-size: 13px;
    padding: 8px 0 4px;
  }

  /* ---------- Footer ---------- */
  .footer {
    text-align: center;
    padding-top: 10px;
    line-height: 1.6;
  }

  /* ---------- Print button ---------- */
  .no-print { text-align: center; margin-top: 12px; }
  .no-print button {
    padding: 8px 24px;
    font-size: 14px;
    cursor: pointer;
    background: #4CAF50;
    color: #fff;
    border: none;
    border-radius: 4px;
  }
  .no-print button:hover { background: #45a049; }

  /* ---------- Print media (58mm thermal) ---------- */
  @media print {
    @page {
      size: 58mm auto;
      margin: 2mm 3mm;
    }

    html, body {
      width: 58mm;
      background: #fff;
      padding: 0;
      margin: 0;
      font-size: 11px;
      line-height: 1.6;
      -webkit-print-color-adjust: exact;
    }

    .receipt {
      border: none;
      width: 100%;
      max-width: 52mm;
      padding: 2mm 0;
      margin: 0;
    }

    .no-print { display: none !important; }

    .header .shop-name { font-size: 15px; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="receipt" id="receipt">
    <!-- filled by JS -->
  </div>
  <div class="no-print">
    <button onclick="window.print()">🖨️ Cetak Nota</button>
  </div>
</div>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);

  function get(key, fallback) {
    return params.get(key) || fallback || '';
  }

  function rupiah(n) {
    var num = parseFloat(n) || 0;
    return 'Rp ' + num.toLocaleString('id-ID', { minimumFractionDigits: 0 });
  }

  function splitList(raw) {
    if (!raw) return [];
    return raw.split(/\s*,\s*/);
  }

  function formatDate(d, t) {
    if (!d) return '-';
    var parts = d.split('-');
    if (parts.length !== 3) return d;
    var result = parts[2] + '/' + parts[1] + '/' + parts[0];
    if (t) result += ' ' + t;
    return result;
  }

  /* ---- data ---- */
  var namaToko    = get('nama_toko', 'Nama Toko');
  var alamatToko  = get('alamat_toko', '');
  var telpToko    = get('telp_toko', '');
  var idTransaksi = get('id_transaksi', '-');
  var tanggal     = get('tanggal', '');
  var waktu       = get('waktu', '');
  var total       = get('total', '0');
  var tunai       = get('tunai', '0');
  var kembali     = get('kembali', '0');

  var namaProduk  = splitList(get('nama_produk'));
  var hargaProduk = splitList(get('harga_produk'));
  var qty         = splitList(get('qty'));
  var subTotal    = splitList(get('sub_total'));

  /* ---- build HTML ---- */
  var html = '';

  /* Header */
  html += '<div class="header">';
  html += '  <div class="shop-name">' + namaToko + '</div>';
  html += '  <div class="receipt-title">Nota Penjualan</div>';
  if (alamatToko) html += '  <div>' + alamatToko + '</div>';
  if (telpToko)   html += '  <div>Telp: ' + telpToko + '</div>';
  html += '</div>';

  html += '<hr class="divider">';

  /* Transaction info */
  html += '<div class="info">';
  html += '  <div class="info-row">No: ' + idTransaksi + '</div>';
  html += '  <div class="info-row">Tanggal: ' + formatDate(tanggal, waktu) + '</div>';
  html += '</div>';

  html += '<hr class="divider">';

  /* Items — vertical layout */
  html += '<div class="items-list">';

  var count = Math.max(namaProduk.length, hargaProduk.length, qty.length, subTotal.length);
  if (count === 0) {
    html += '<div style="text-align:center;padding:12px 0;">Tidak ada item</div>';
  }
  for (var i = 0; i < count; i++) {
    html += '<div class="item-entry">';
    html += '  <div class="item-name">' + (namaProduk[i] || '-') + '</div>';
    html += '  <div class="item-detail">';
    html += '    <span>' + (qty[i] || '0') + ' x ' + rupiah(hargaProduk[i]) + '</span>';
    html += '  </div>';
    html += '  <div class="item-subtotal">' + rupiah(subTotal[i]) + '</div>';
    html += '</div>';
  }

  html += '</div>';

  html += '<hr class="divider">';

  /* Totals */
  html += '<div class="totals">';
  html += '  <div class="row grand"><span>TOTAL</span><span>' + rupiah(total) + '</span></div>';
  html += '  <div class="row"><span>Bayar</span><span>' + rupiah(tunai) + '</span></div>';
  html += '  <div class="row"><span>Kembali</span><span>' + rupiah(kembali) + '</span></div>';
  html += '</div>';

  html += '<hr class="divider">';

  /* Footer */
  html += '<div class="footer">';
  html += '  <p>Terima kasih atas kunjungan Anda!</p>';
  html += '  <p style="margin-top:6px;">Barang yang sudah dibeli tidak dapat<br>ditukar / dikembalikan</p>';
  html += '</div>';

  document.getElementById('receipt').innerHTML = html;
})();
</script>

</body>
</html>
